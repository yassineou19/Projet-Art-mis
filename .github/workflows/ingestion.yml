name: Artemis Ingestion Pipeline

on:
  push:
    branches:
      - main
      - feature/artemis-ui-v2
      - feature/ingestion-pipeline

  schedule:
    - cron: "17 */2 * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Type d'ingestion à lancer"
        required: true
        default: "recent"
        type: choice
        options:
          - recent
          - backfill
      backfill_runs:
        description: "Nombre max d'appels API pour le backfill historique"
        required: false
        default: "12"
      backfill_sleep_seconds:
        description: "Pause entre deux batches backfill"
        required: false
        default: "300"
      rate_limit_sleep_seconds:
        description: "Marge d'appels API conservée pour éviter le 429"
        required: false
        default: "3"

concurrency:
  group: artemis-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run recent ingestion
        if: github.event_name == 'push' || github.event_name == 'schedule' || github.event.inputs.mode == 'recent'
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_SCHEMA: ${{ secrets.DB_SCHEMA }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          THESPACEDEVS_API_KEY: ${{ secrets.THESPACEDEVS_API_KEY }}

        run: |
          python -m scripts.run_recent_ingestion

      - name: Audit historical coverage
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'backfill'
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_SCHEMA: ${{ secrets.DB_SCHEMA }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          THESPACEDEVS_API_KEY: ${{ secrets.THESPACEDEVS_API_KEY }}
          HISTORICAL_AUDIT_MAX_YEARS: "5"
          HISTORICAL_AUDIT_SLEEP_SECONDS: "300"
          HISTORICAL_RESERVED_API_CALLS: ${{ github.event.inputs.rate_limit_sleep_seconds }}

        run: |
          python -m scripts.audit_historical_years

      - name: Run slow historical backfill
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'backfill'
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_SCHEMA: ${{ secrets.DB_SCHEMA }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          THESPACEDEVS_API_KEY: ${{ secrets.THESPACEDEVS_API_KEY }}
          HISTORICAL_BACKFILL_MAX_YEARS: "1"
          HISTORICAL_BACKFILL_SLEEP_SECONDS: ${{ github.event.inputs.backfill_sleep_seconds }}
          HISTORICAL_BACKFILL_MAX_API_CALLS: ${{ github.event.inputs.backfill_runs }}
          HISTORICAL_RESERVED_API_CALLS: ${{ github.event.inputs.rate_limit_sleep_seconds }}

        run: |
          python -m scripts.backfill_historical_years
